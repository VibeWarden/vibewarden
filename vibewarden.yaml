# yaml-language-server: $schema=https://vibewarden.dev/schema/v1/config.json
# vibewarden.yaml — VibeWarden Security Sidecar Configuration
# Generated by `vibew init`. Edit as needed.
# Full reference: https://vibewarden.dev/docs/config

server:
  host: "0.0.0.0"
  port: 8443

upstream:
  host: "0.0.0.0"
  port: 3000

# app configures how your application is included in the generated docker-compose.yml.
# Set app.build to build from source (default), or app.image to pull a pre-built image (production).
# Remove this section if you manage your app service manually.
app:
  build: "."
  # image: "interactiveapp:latest"  # use in production instead of build

log:
  level: "info"
  format: "json"

security_headers:
  enabled: true
  hsts_max_age: 31536000
  hsts_include_subdomains: true
  hsts_preload: false
  content_type_nosniff: true
  frame_option: "SAMEORIGIN"
  content_security_policy: "default-src 'self'; style-src 'self' 'unsafe-inline'"
  referrer_policy: "strict-origin-when-cross-origin"
  permissions_policy: "geolocation=(), microphone=(), camera=()"

tls:
  enabled: true
  provider: "self-signed"

rate_limit:
  enabled: true
  trust_proxy_headers: false
  per_ip:
    requests_per_second: 10
    burst: 20
  exempt_paths:
    - "/health"

# Escape hatches — uncomment to supply hand-crafted config files instead of
# relying on VibeWarden's runtime generation. Paths are relative to the
# .vibewarden/generated/ directory.
#
# overrides:
#   kratos_config: ""      # path to a custom kratos.yml
#   docker_compose: ""     # path to a custom docker-compose.yml
