version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/vibewarden/vibewarden

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gosec

  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: blank-imports
          severity: warning
        - name: context-as-argument
          severity: warning
        - name: error-return
          severity: warning
        - name: error-strings
          severity: warning
        - name: errorf
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: var-naming
          severity: warning

    gosec:
      severity: medium
      confidence: medium

    errcheck:
      # fmt.Fprint* writes to user-facing output (os.Stdout/Stderr or io.Writer);
      # write errors on these streams are not recoverable and can be ignored.
      exclude-functions:
        - "fmt.Fprint"
        - "fmt.Fprintln"
        - "fmt.Fprintf"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
