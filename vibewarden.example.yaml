# VibeWarden Configuration
# Copy this file to vibewarden.yaml and customize as needed.
# Environment variables can override any setting using VIBEWARDEN_ prefix.
# Example: VIBEWARDEN_SERVER_PORT=9090 overrides server.port

# Server settings
server:
  # Host to bind to (use 0.0.0.0 to expose externally)
  host: "127.0.0.1"
  # Port to listen on
  port: 8080

# Upstream application being protected
upstream:
  # Host of your application
  host: "127.0.0.1"
  # Port of your application
  port: 3000

# TLS configuration
tls:
  # Enable TLS termination (set to true in production).
  # When enabled, HTTP requests on port 80 are automatically redirected to HTTPS.
  enabled: false

  # Provider selects how TLS certificates are obtained. Valid values:
  #
  #   letsencrypt  — Automatic ACME certificate via Let's Encrypt.
  #                  Requires a public domain and open port 443.
  #                  Also requires the "domain" field to be set.
  #
  #   self-signed  — Caddy generates an internal self-signed certificate.
  #                  Suitable for local development and internal services.
  #                  Browsers will show a security warning.
  #
  #   external     — You supply the certificate and key files.
  #                  Requires "cert_path" and "key_path" to be set.
  #                  Use this when TLS is already managed by Cloudflare,
  #                  your registrar, AWS ACM, or another tool.
  provider: "self-signed"

  # Domain for certificate provisioning.
  # Required when provider is "letsencrypt".
  # Optional for "self-signed" (scopes the certificate to that hostname).
  domain: ""

  # Certificate and key paths — required when provider is "external".
  cert_path: ""
  key_path: ""

  # Directory where Caddy stores ACME certificates.
  # Uses the Caddy default (~/.local/share/caddy) when empty.
  # Only applies when provider is "letsencrypt".
  storage_path: ""

# Ory Kratos (identity/auth) settings
kratos:
  # Kratos public API (user-facing flows). When set, VibeWarden automatically:
  #   1. Validates session cookies against Kratos on every protected request.
  #   2. Proxies all Kratos self-service flow paths to Kratos instead of the
  #      upstream app. This includes:
  #        /self-service/login/*       → Kratos login flow
  #        /self-service/registration/*→ Kratos registration flow
  #        /self-service/logout/*      → Kratos logout
  #        /self-service/settings/*    → Kratos settings
  #        /self-service/recovery/*    → Kratos recovery
  #        /self-service/verification/*→ Kratos verification
  #        /.ory/kratos/public/*       → Ory canonical prefix (alias)
  #
  # Leave empty to disable authentication (not recommended in production).
  #
  # Local binary (running outside Docker):
  public_url: "http://127.0.0.1:4433"
  # Kratos admin API (internal use — not exposed to the internet).
  admin_url: "http://127.0.0.1:4434"
  #
  # Docker Compose dev environment:
  # The VIBEWARDEN_KRATOS_PUBLIC_URL and VIBEWARDEN_KRATOS_ADMIN_URL environment
  # variables in docker-compose.yml override these values so that the container
  # resolves Kratos by its service name on the internal Docker network:
  #
  #   VIBEWARDEN_KRATOS_PUBLIC_URL: http://kratos:4433
  #   VIBEWARDEN_KRATOS_ADMIN_URL:  http://kratos:4434

# Auth middleware settings (requires kratos.public_url to be set)
auth:
  # List of URL path glob patterns that bypass authentication entirely.
  # The /_vibewarden/* prefix is always public (health check etc.).
  # Add your app's public routes here; supports * for single-segment wildcards.
  # Example:
  #   public_paths:
  #     - "/static/*"
  #     - "/favicon.ico"
  #     - "/robots.txt"
  public_paths: []

  # Cookie name used by Kratos for session tokens.
  # Only change this if you have customised your Kratos configuration.
  session_cookie_name: "ory_kratos_session"

  # URL to redirect unauthenticated users to.
  # Defaults to /self-service/login/browser (Kratos browser login flow).
  login_url: ""

# Rate limiting
rate_limit:
  # Enable rate limiting
  enabled: true
  # Requests per second per client
  requests_per_second: 100
  # Maximum burst size
  burst_size: 50

# Logging
log:
  # Level: debug, info, warn, error
  level: "info"
  # Format: json (recommended) or text
  format: "json"

# Admin API (for user management, metrics, etc.)
admin:
  # Enable admin API
  enabled: false
  # Bearer token for authentication (use env var VIBEWARDEN_ADMIN_TOKEN in production)
  token: ""

# Security headers added to all proxied responses
security_headers:
  # Enable security headers middleware (recommended: true)
  enabled: true
  # Strict-Transport-Security max-age in seconds (default: 31536000 = 1 year)
  # HSTS is only sent over HTTPS connections — ignored on plain HTTP
  hsts_max_age: 31536000
  # Include the includeSubDomains directive in HSTS
  hsts_include_subdomains: true
  # Include the preload directive (requires manual submission to browser preload lists)
  hsts_preload: false
  # Set X-Content-Type-Options: nosniff
  content_type_nosniff: true
  # Set X-Frame-Options: "DENY", "SAMEORIGIN", or "" to disable
  frame_option: "DENY"
  # Content-Security-Policy value (empty string disables the header)
  content_security_policy: "default-src 'self'"
  # Referrer-Policy value (empty string disables the header)
  referrer_policy: "strict-origin-when-cross-origin"
  # Permissions-Policy value (empty string disables the header)
  permissions_policy: ""
