# Egress proxy test stack
# Runs httpbin locally so egress tests don't hit the internet.
#
# Usage:
#   cd test/egress
#   docker compose up -d
#   ./test.sh
#   docker compose down

services:
  # Local httpbin — echoes requests back as JSON
  httpbin:
    image: kennethreitz/httpbin:latest
    networks:
      - egress-test

  # VibeWarden sidecar with egress enabled
  vibewarden:
    image: ghcr.io/vibewarden/vibewarden:latest
    command: ["serve", "--config", "/etc/vibewarden/vibewarden.yaml"]
    volumes:
      - ./vibewarden.yaml:/etc/vibewarden/vibewarden.yaml:ro
    networks:
      - egress-test
    depends_on:
      - httpbin

  # Simulated app — Alpine with wget/curl for making egress calls
  app:
    image: alpine:3.21
    command: ["sleep", "infinity"]
    networks:
      - egress-test
    depends_on:
      - vibewarden

networks:
  egress-test:
    driver: bridge
