# Ory Kratos configuration for the VibeWarden demo app.
#
# This file is mounted read-only into the kratos container at:
#   /etc/config/kratos/kratos.yml
#
# The DSN and serve.*.base_url values are overridden by the environment
# variables set in docker-compose.yml.

version: v1.3.1

# Overridden by the DSN environment variable in docker-compose.yml.
dsn: memory

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:8080
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://localhost:4434/

selfservice:
  # After a successful login / registration the browser is sent to VibeWarden.
  default_browser_return_url: http://localhost:8080/
  allowed_return_urls:
    - http://localhost:8080

  methods:
    password:
      enabled: true

  flows:
    registration:
      enabled: true
      ui_url: http://localhost:8080/auth/registration
    login:
      ui_url: http://localhost:8080/auth/login
    logout:
      after:
        default_browser_return_url: http://localhost:8080/
    settings:
      ui_url: http://localhost:8080/auth/settings
    verification:
      enabled: true
      ui_url: http://localhost:8080/auth/verification
    recovery:
      enabled: true
      use: code
      ui_url: http://localhost:8080/auth/recovery

log:
  level: info
  format: json

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    # mailslurper container on the internal Docker network.
    connection_uri: smtp://mailslurper:4436/?skip_ssl_verify=true
