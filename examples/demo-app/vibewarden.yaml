# VibeWarden configuration for the demo app.
#
# This file is the single source of truth for all demo profiles.
# Behaviour is controlled by the VIBEWARDEN_PROFILE environment variable:
#
#   dev   — HTTP :8080, relaxed limits, no TLS (default)
#   tls   — HTTPS :8443, self-signed certificate
#   prod  — HTTPS :80/:443, Let's Encrypt (requires DOMAIN env var)
#
# All other settings are identical across profiles.  Set the appropriate
# VIBEWARDEN_* environment variables in docker compose (or your .env file)
# to override individual values without editing this file.
#
# Env vars that change per profile (set in docker-compose.yml or .env):
#   VIBEWARDEN_SERVER_PORT          — 8080 (dev), 8443 (tls), 443 (prod)
#   VIBEWARDEN_TLS_ENABLED          — false (dev), true (tls/prod)
#   VIBEWARDEN_TLS_PROVIDER         — "" (dev), "self-signed" (tls), "letsencrypt" (prod)
#   VIBEWARDEN_TLS_DOMAIN           — "" (dev/tls), your domain (prod)
#   VIBEWARDEN_RATE_LIMIT_PER_IP_REQUESTS_PER_SECOND — 5 (dev/tls), 20 (prod)
#   VIBEWARDEN_RATE_LIMIT_PER_IP_BURST               — 10 (dev/tls), 40 (prod)

server:
  host: "0.0.0.0"
  port: 8080

upstream:
  host: "demo-app"
  port: 3000

tls:
  enabled: false

kratos:
  # Resolved via the internal Docker network.
  public_url: "http://kratos:4433"
  admin_url:  "http://kratos:4434"

auth:
  # Paths that do NOT require authentication.
  public_paths:
    - "/"
    - "/public"
    - "/health"
    - "/profile"
    - "/static"
    - "/auth"
    - "/vuln"
  session_cookie_name: "ory_kratos_session"
  login_url: ""

rate_limit:
  enabled: true
  # Low limits so you can trigger them easily during the demo.
  # Try: for i in $(seq 1 20); do curl -s -o /dev/null -w "%{http_code}\n" -X POST http://localhost:8080/spam; done
  per_ip:
    requests_per_second: 5
    burst: 10
  per_user:
    requests_per_second: 10
    burst: 20
  trust_proxy_headers: false
  exempt_paths: []

log:
  level: "info"
  format: "json"

admin:
  enabled: false
  token: ""

metrics:
  enabled: true
  path_patterns:
    - "/"
    - "/public"
    - "/me"
    - "/headers"
    - "/spam"
    - "/health"

secrets:
  enabled: true
  provider: openbao
  openbao:
    address: http://openbao:8200
    auth:
      method: token
      token: demo-root-token
    mount_path: secret
  inject:
    headers:
      - secret_path: demo/api-key
        secret_key: token
        header: X-Demo-Api-Key
    env_file: /tmp/vibewarden-demo-secrets.env
    env:
      - secret_path: demo/app-config
        secret_key: database_url
        env_var: DEMO_DATABASE_URL
      - secret_path: demo/app-config
        secret_key: session_secret
        env_var: DEMO_SESSION_SECRET
  cache_ttl: "5m"

security_headers:
  enabled: true
  hsts_max_age: 31536000
  hsts_include_subdomains: true
  hsts_preload: false
  content_type_nosniff: true
  frame_option: "DENY"
  content_security_policy: "default-src 'self'; style-src 'self'; script-src 'self' 'unsafe-inline'"
  referrer_policy: "strict-origin-when-cross-origin"
  permissions_policy: ""
