# VibeWarden Demo App Configuration
# Single source of truth for the entire demo stack.
#
# Usage:
#   vibewarden generate
#   docker compose -f .vibewarden/generated/docker-compose.yml up
#
# Or simply: make demo

# Deployment profile: dev | tls | prod
profile: dev

# User application
app:
  # Build from local Dockerfile (dev mode)
  build: .
  # Image for production (overridable via VIBEWARDEN_APP_IMAGE):
  # image: ghcr.io/vibewarden/demo-app:latest

server:
  host: "0.0.0.0"
  port: 8443

upstream:
  host: app
  port: 3000

tls:
  enabled: true
  provider: self-signed

kratos:
  public_url: "http://kratos:4433"
  admin_url: "http://kratos:4434"

auth:
  enabled: true
  mode: "kratos"
  public_paths:
    - "/"
    - "/public"
    - "/health"
    - "/profile"
    - "/static"
    - "/auth"
    - "/vuln"
  session_cookie_name: "ory_kratos_session"

rate_limit:
  enabled: true
  store: memory
  per_ip:
    requests_per_second: 5
    burst: 10
  per_user:
    requests_per_second: 10
    burst: 20
  trust_proxy_headers: false
  exempt_paths: []

log:
  level: "info"
  format: "json"

admin:
  enabled: false

metrics:
  enabled: true
  path_patterns:
    - "/"
    - "/public"
    - "/me"
    - "/headers"
    - "/spam"
    - "/health"

secrets:
  enabled: true
  provider: openbao
  openbao:
    address: http://openbao:8200
    auth:
      method: token
    mount_path: secret
  inject:
    headers:
      - secret_path: demo/api-key
        secret_key: token
        header: X-Demo-Api-Key
    env:
      - secret_path: demo/app-config
        secret_key: database_url
        env_var: DEMO_DATABASE_URL
      - secret_path: demo/app-config
        secret_key: session_secret
        env_var: DEMO_SESSION_SECRET
  cache_ttl: "5m"

security_headers:
  enabled: true
  hsts_max_age: 31536000
  hsts_include_subdomains: true
  hsts_preload: false
  content_type_nosniff: true
  frame_option: "DENY"
  content_security_policy: "default-src 'self'; style-src 'self'; script-src 'self' 'unsafe-inline'"
  referrer_policy: "strict-origin-when-cross-origin"

observability:
  enabled: true
  grafana_port: 3001
  prometheus_port: 9090
  loki_port: 3100
  retention_days: 7

# Override paths for demo-specific configs
overrides:
  kratos_config: ""
  identity_schema: ""
