# vibewarden.prod.yaml — Production configuration example
#
# Copy this file to your project root, rename it to vibewarden.prod.yaml (or
# vibewarden.yaml if you only have one environment), and fill in the values
# marked with TODO.
#
# Generate the Docker Compose stack from this config:
#   ./vibew generate --config vibewarden.prod.yaml
#
# See https://vibewarden.dev/docs/configuration for the full reference.

# -------------------------------------------------------------------------
# Deployment profile
# -------------------------------------------------------------------------
# prod   — enforces credential validation, letsencrypt TLS, JSON logs
# tls    — same as prod but accepts self-signed certs (staging)
# dev    — self-signed cert, relaxed validation, text logs
profile: prod

# -------------------------------------------------------------------------
# Your application image
# -------------------------------------------------------------------------
# In prod profile, vibew generate includes your app container in the
# generated docker-compose.yml using this image.
app:
  image: "ghcr.io/your-org/myapp:latest"   # TODO: your production image

# -------------------------------------------------------------------------
# VibeWarden listener
# -------------------------------------------------------------------------
# Always bind to 0.0.0.0 inside Docker so the container port mapping works.
server:
  host: "0.0.0.0"
  port: 443

# -------------------------------------------------------------------------
# Upstream application
# -------------------------------------------------------------------------
# host must match the Docker Compose service name for your app container.
upstream:
  host: "app"     # TODO: your app's Docker Compose service name
  port: 3000      # TODO: the port your app listens on

  # Active health checking — VibeWarden stops forwarding requests to a
  # container that fails health checks until it recovers.
  health:
    enabled: true
    path: /health
    interval: 10s
    timeout: 5s
    unhealthy_threshold: 3
    healthy_threshold: 2

# -------------------------------------------------------------------------
# TLS — Let's Encrypt (automatic, free)
# -------------------------------------------------------------------------
# Caddy handles certificate issuance and renewal automatically.
# Requirements:
#   1. tls.domain must match your DNS A record (propagation verified).
#   2. Port 80 must be reachable from the internet (ACME HTTP-01 challenge).
#   3. Port 443 must be reachable from the internet.
tls:
  enabled: true
  provider: letsencrypt
  domain: "demo.yourdomain.com"   # TODO: your public domain

  # Caddy stores certificates in the caddy_data Docker volume.
  # Leave storage_path empty to use the default (/root/.local/share/caddy).
  storage_path: ""

# -------------------------------------------------------------------------
# Authentication — JWT / OIDC
# -------------------------------------------------------------------------
# auth.mode: jwt validates Bearer tokens from any OIDC-compatible provider
# (Auth0, Keycloak, Firebase, Cognito, Okta, Supabase, etc.).
# For Kratos-managed users use auth.mode: kratos instead.
auth:
  enabled: true
  mode: jwt

  jwt:
    # JWKS endpoint (direct) or OIDC discovery URL (issuer_url).
    # Provide one of the two; jwks_url takes precedence.
    jwks_url: "https://your-idp/.well-known/jwks.json"   # TODO
    # issuer_url: "https://your-idp/"                    # alternative: OIDC discovery

    # iss and aud claims are validated on every token.
    issuer:   "https://your-idp/"                        # TODO
    audience: "https://api.yourdomain.com"               # TODO

    # JWT claims forwarded as headers to your upstream app.
    claims_to_headers:
      sub:            "X-User-Id"
      email:          "X-User-Email"
      email_verified: "X-User-Verified"

    # JWKS keys are cached to avoid a round-trip on every request.
    cache_ttl: 1h

    # Only RS256 and ES256 are safe for production. Never allow none or HS256.
    allowed_algorithms:
      - RS256
      - ES256

  # Paths that do not require a valid JWT.
  # The health endpoint must always be public for container health checks.
  public_paths:
    - /health
    - /static/*
    - /favicon.ico
    - /robots.txt

# -------------------------------------------------------------------------
# Rate limiting — per-IP and per-user token buckets
# -------------------------------------------------------------------------
# Both limits are enforced independently. A request must pass both to
# reach the upstream. Failing either returns 429 with a Retry-After header.
#
# Tune these values to your expected legitimate traffic. The defaults below
# are a safe starting point for a typical web API.
rate_limit:
  enabled: true

  # memory: suitable for a single-instance deployment.
  # redis:  required if you run multiple VibeWarden instances behind a load
  #         balancer. Add a rate_limit.redis block (see configuration docs).
  store: memory

  per_ip:
    requests_per_second: 20
    burst: 40

  per_user:
    requests_per_second: 200
    burst: 400

  # Set to true only when VibeWarden sits behind a trusted reverse proxy
  # (Cloudflare, nginx) that sets X-Forwarded-For. Never enable on a
  # server directly facing the internet.
  trust_proxy_headers: false

  # Paths excluded from rate limiting (e.g. Prometheus scrape endpoint).
  exempt_paths:
    - /_vibewarden/healthz

# -------------------------------------------------------------------------
# Web Application Firewall
# -------------------------------------------------------------------------
# mode: block  — reject requests that trigger a rule (returns 400)
# mode: detect — log only, do not block (useful during initial rollout)
waf:
  enabled: true
  mode: block
  rules:
    sqli:               true   # SQL injection
    xss:                true   # Cross-site scripting
    path_traversal:     true   # Directory traversal (../../)
    command_injection:  true   # OS command injection

# -------------------------------------------------------------------------
# Security headers
# -------------------------------------------------------------------------
# These headers are added to every response from your upstream app.
security_headers:
  enabled: true

  # HSTS: tell browsers to always use HTTPS for this domain.
  # 31536000 = 1 year. Do not reduce in production.
  hsts_max_age: 31536000
  hsts_include_subdomains: true
  # hsts_preload: false
  # Only set preload to true AFTER submitting the domain to the HSTS preload
  # list (https://hstspreload.org/). This cannot be reverted without a browser
  # update cycle.
  hsts_preload: false

  # Prevent MIME-type sniffing.
  content_type_nosniff: true

  # Disallow rendering the site in an iframe (clickjacking protection).
  # Use SAMEORIGIN if your app uses iframes internally.
  frame_option: "DENY"

  # Content Security Policy — restrict which resources the browser loads.
  # Start restrictive and loosen as needed (check browser console errors).
  content_security_policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"

  # Do not send the full Referer URL when navigating to external sites.
  referrer_policy: "strict-origin-when-cross-origin"

  # Restrict access to browser features (camera, geolocation, etc.).
  # Empty string disables this header. Customise to your app's needs.
  permissions_policy: ""

  cross_origin_opener_policy:   "same-origin"
  cross_origin_resource_policy: "same-origin"
  permitted_cross_domain_policies: "none"

  # Remove the Via header added by Caddy to avoid leaking proxy details.
  suppress_via_header: true

# -------------------------------------------------------------------------
# Body size limits
# -------------------------------------------------------------------------
# Reject requests larger than the global max. Avoids out-of-memory crashes
# caused by large uploads hitting an unprotected endpoint.
body_size:
  max: "10MB"
  # Per-path overrides for endpoints that legitimately accept large uploads:
  # overrides:
  #   - path: /api/upload
  #     max: 100MB

# -------------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------------
# format: json — machine-readable, suitable for log aggregation (Loki, etc.)
# level:  info — reduce to debug for troubleshooting, error for quiet prod
log:
  level: "info"
  format: "json"

# -------------------------------------------------------------------------
# Admin API
# -------------------------------------------------------------------------
# The admin API exposes endpoints for runtime inspection and token management.
# Always inject the token via the environment variable — never hard-code it.
# Generate a token: openssl rand -hex 32
admin:
  enabled: true
  token: "${VIBEWARDEN_ADMIN_TOKEN}"   # set in your .env file or secrets manager

# -------------------------------------------------------------------------
# Telemetry — Prometheus metrics
# -------------------------------------------------------------------------
# Metrics are exposed at /_vibewarden/metrics (requires admin token).
# path_patterns normalise dynamic URL segments into labelled patterns so that
# Prometheus does not create one time series per user ID.
telemetry:
  enabled: true
  prometheus:
    enabled: true
  path_patterns:
    - "/api/v1/:resource"
    - "/api/v1/:resource/:id"
